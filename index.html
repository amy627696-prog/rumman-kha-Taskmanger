<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Pro - Professional Task Manager</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --white: #ffffff;
        }

        [data-theme="dark"] {
            --gray-50: #111827;
            --gray-100: #1f2937;
            --gray-200: #374151;
            --gray-300: #4b5563;
            --gray-400: #6b7280;
            --gray-500: #9ca3af;
            --gray-600: #d1d5db;
            --gray-700: #e5e7eb;
            --gray-800: #f3f4f6;
            --gray-900: #f9fafb;
            --white: #111827;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--gray-50) 0%, var(--gray-100) 100%);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        [data-theme="dark"] body {
            background: linear-gradient(135deg, var(--gray-900) 0%, var(--gray-800) 100%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .theme-toggle {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: var(--primary);
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            transition: all 0.3s ease;
        }

        [data-theme="dark"] .stat-card {
            background: var(--gray-800);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            color: var(--gray-500);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-section {
            background: var(--white);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
            position: relative;
        }

        [data-theme="dark"] .input-section {
            background: var(--gray-800);
        }

        .input-group {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr auto;
            gap: 1rem;
            align-items: end;
        }

        .form-input {
            padding: 1rem 1.5rem;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-select {
            background: var(--white);
            padding: 1rem 1.5rem;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            font-size: 1rem;
        }

        [data-theme="dark"] .form-select,
        [data-theme="dark"] .form-input {
            background: var(--gray-700);
            border-color: var(--gray-600);
            color: var(--gray-100);
        }

        .add-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }

        .tasks-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .tasks-column {
            background: var(--white);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }

        [data-theme="dark"] .tasks-column {
            background: var(--gray-800);
        }

        .column-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--gray-200);
        }

        .priority-high { border-color: var(--danger); }
        .priority-medium { border-color: var(--warning); }
        .priority-low { border-color: var(--secondary); }

        .column-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .priority-high .column-title { color: var(--danger); }
        .priority-medium .column-title { color: var(--warning); }
        .priority-low .column-title { color: var(--secondary); }

        .task-item {
            background: var(--gray-50);
            margin-bottom: 1rem;
            padding: 1.5rem;
            border-radius: 16px;
            cursor: grab;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
            position: relative;
        }

        [data-theme="dark"] .task-item {
            background: var(--gray-700);
        }

        .task-item.dragging {
            opacity: 0.5;
            transform: rotate(5deg);
        }

        .task-item.overdue {
            border-left-color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        .task-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }

        .task-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--gray-500);
        }

        .task-actions {
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .task-item:hover .task-actions {
            opacity: 1;
        }

        .action-btn {
            background: none;
            border: none;
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--gray-500);
        }

        .action-btn:hover {
            background: var(--gray-200);
            color: var(--gray-700);
        }

        .delete-btn:hover {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .complete-btn.completed {
            color: var(--secondary);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--gray-500);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .input-group {
                grid-template-columns: 1fr;
            }
            
            .tasks-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </button>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-tasks"></i> Todo Pro</h1>
            <p>Professional Task Management</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalTasks">0</div>
                <div class="stat-label">Total Tasks</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingTasks">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedTasks">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="overdueTasks">0</div>
                <div class="stat-label">Overdue</div>
            </div>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input type="text" class="form-input" id="taskInput" placeholder="Enter your task..." maxlength="100">
                <select class="form-select" id="prioritySelect">
                    <option value="low">Low Priority</option>
                    <option value="medium" selected>Medium Priority</option>
                    <option value="high">High Priority</option>
                </select>
                <select class="form-select" id="categorySelect">
                    <option value="work">Work</option>
                    <option value="personal">Personal</option>
                    <option value="urgent">Urgent</option>
                    <option value="other">Other</option>
                </select>
                <input type="date" class="form-input" id="dueDateInput">
                <button class="add-btn" id="addTaskBtn">
                    <i class="fas fa-plus"></i> Add Task
                </button>
            </div>
        </div>

        <div class="tasks-section">
            <div class="tasks-column priority-high">
                <div class="column-header">
                    <i class="fas fa-exclamation-triangle"></i>
                    <div class="column-title">High Priority</div>
                </div>
                <div id="highPriorityTasks" class="tasks-list"></div>
            </div>

            <div class="tasks-column priority-medium">
                <div class="column-header">
                    <i class="fas fa-circle-info"></i>
                    <div class="column-title">Medium Priority</div>
                </div>
                <div id="mediumPriorityTasks" class="tasks-list"></div>
            </div>

            <div class="tasks-column priority-low">
                <div class="column-header">
                    <i class="fas fa-circle-check"></i>
                    <div class="column-title">Low Priority</div>
                </div>
                <div id="lowPriorityTasks" class="tasks-list"></div>
            </div>
        </div>
    </div>

    <script>
        class TodoPro {
            constructor() {
                this.tasks = JSON.parse(localStorage.getItem('todoProTasks')) || [];
                this.currentTheme = localStorage.getItem('todoProTheme') || 'light';
                this.init();
            }

            init() {
                this.applyTheme();
                this.bindEvents();
                this.render();
                this.updateStats();
            }

            applyTheme() {
                document.documentElement.setAttribute('data-theme', this.currentTheme);
                const icon = document.getElementById('themeToggle').querySelector('i');
                icon.className = this.currentTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            }

            bindEvents() {
                // Theme toggle
                document.getElementById('themeToggle').addEventListener('click', () => {
                    this.currentTheme = this.currentTheme === 'light' ? 'dark' : 'light';
                    localStorage.setItem('todoProTheme', this.currentTheme);
                    this.applyTheme();
                });

                // Add task
                document.getElementById('addTaskBtn').addEventListener('click', () => this.addTask());
                document.getElementById('taskInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.addTask();
                });

                // Drag & drop
                this.enableDragAndDrop();
            }

            addTask() {
                const title = document.getElementById('taskInput').value.trim();
                const priority = document.getElementById('prioritySelect').value;
                const category = document.getElementById('categorySelect').value;
                const dueDate = document.getElementById('dueDateInput').value;

                if (!title) return;

                const task = {
                    id: Date.now().toString(),
                    title,
                    priority,
                    category,
                    dueDate: dueDate || null,
                    completed: false,
                    createdAt: new Date().toISOString()
                };

                this.tasks.unshift(task);
                this.saveTasks();
                this.render();
                this.updateStats();

                // Reset form
                document.getElementById('taskInput').value = '';
                document.getElementById('dueDateInput').value = '';
            }

            toggleComplete(taskId) {
                const task = this.tasks.find(t => t.id === taskId);
                if (task) {
                    task.completed = !task.completed;
                    this.saveTasks();
                    this.render();
                    this.updateStats();
                }
            }

            deleteTask(taskId) {
                this.tasks = this.tasks.filter(t => t.id !== taskId);
                this.saveTasks();
                this.render();
                this.updateStats();
            }

            render() {
                const highPriority = document.getElementById('highPriorityTasks');
                const mediumPriority = document.getElementById('mediumPriorityTasks');
                const lowPriority = document.getElementById('lowPriorityTasks');

                highPriority.innerHTML = '';
                mediumPriority.innerHTML = '';
                lowPriority.innerHTML = '';

                this.tasks.forEach(task => {
                    const taskElement = this.createTaskElement(task);
                    const container = document.getElementById(`${task.priority}PriorityTasks`);
                    container.appendChild(taskElement);
                });
            }

            createTaskElement(task) {
                const div = document.createElement('div');
                div.className = `task-item ${task.completed ? 'completed' : ''}`;
                div.draggable = true;
                div.dataset.taskId = task.id;

                const isOverdue = task.dueDate && new Date(task.dueDate) < new Date() && !task.completed;
                if (isOverdue) div.classList.add('overdue');

                const categoryIcon = {
                    work: 'fas fa-briefcase',
                    personal: 'fas fa-user',
                    urgent: 'fas fa-fire',
                    other: 'fas fa-circle'
                }[task.category] || 'fas fa-circle';

                const formatDate = (dateStr) => {
                    if (!dateStr) return '';
                    return new Date(dateStr).toLocaleDateString('en-US', {
                        month: 'short',
                        day: 'numeric',
                        year: 'numeric'
                    });
                };

                div.innerHTML = `
                    <div class="task-header">
                        <div>
                            <div class="task-title">${task.title}</div>
                            <div class="task-meta">
                                <span><i class="${categoryIcon}"></i> ${task.category}</span>
                                ${task.dueDate ? `<span
